<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线模式 - My Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .offline-container {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .offline-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            color: white;
        }
        
        .offline-message {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .retry-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .retry-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .features {
            margin-top: 40px;
            text-align: left;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 16px;
            opacity: 0.8;
        }
        
        .feature-icon {
            margin-right: 12px;
            font-size: 20px;
        }
        
        @media (max-width: 480px) {
            .offline-container {
                padding: 30px 20px;
            }
            
            .offline-icon {
                font-size: 60px;
            }
            
            .offline-title {
                font-size: 24px;
            }
            
            .offline-message {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📱</div>
        <h1 class="offline-title">离线模式</h1>
        <p class="offline-message">
            您当前处于离线状态，无法连接到互联网。<br>
            不过您仍然可以访问已缓存的页面和功能。
        </p>
        
        <a href="/" class="retry-button" onclick="window.location.reload()">
            重新连接
        </a>
        
        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">🔖</span>
                <span>查看已缓存的书签</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🏠</span>
                <span>访问个人主页</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">⚡</span>
                <span>快速导航功能</span>
            </div>
        </div>
    </div>
    
    <script>
        // 检查网络连接状态
        function checkConnection() {
            if (navigator.onLine) {
                window.location.href = '/';
            }
        }
        
        // 监听网络状态变化
        window.addEventListener('online', checkConnection);
        
        // 定期检查连接
        setInterval(checkConnection, 5000);
        
        // 重试按钮点击事件
        document.querySelector('.retry-button').addEventListener('click', function(e) {
            e.preventDefault();
            checkConnection();
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });
    </script>
</body>
</html>
